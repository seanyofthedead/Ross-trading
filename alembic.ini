; Alembic config for the scanner journal (Phase 2 -- A4 / #43).
;
; Default sqlalchemy.url points at a local SQLite file for ad-hoc CLI use
; (`alembic upgrade head`). Tests bypass this file by passing an existing
; engine connection through ``Config.attributes['connection']``.

[alembic]
script_location = src/ross_trading/journal/migrations
prepend_sys_path = .
sqlalchemy.url = sqlite:///journal.sqlite

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
